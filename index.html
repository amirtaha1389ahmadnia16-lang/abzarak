<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>حرفه‌ای | تبدیل صدا به متن با قابلیت ویرایش مستقیم</title>
    <!-- Font Awesome 6 (free) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
        --card-bg: rgba(255, 255, 255, 0.92);
        --text-primary: #1a2634;
        --text-secondary: #4a5b6e;
        --border-light: rgba(0, 0, 0, 0.08);
        --primary: #2b7a4b;
        --primary-dark: #1e5a38;
        --primary-glow: rgba(43, 122, 75, 0.25);
        --danger: #dc3545;
        --danger-glow: rgba(220, 53, 69, 0.2);
        --warning: #f0ad4e;
        --success: #28a745;
        --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
        --transition: all 0.2s ease;
      }

      body.dark {
        --bg-gradient: linear-gradient(135deg, #1a1f2c 0%, #0f131f 100%);
        --card-bg: rgba(30, 35, 48, 0.92);
        --text-primary: #eef2ff;
        --text-secondary: #a5b4cb;
        --border-light: rgba(255, 255, 255, 0.1);
        --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.4);
      }

      body {
        background: var(--bg-gradient);
        color: var(--text-primary);
        font-family:
          "Segoe UI",
          "Vazir",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        padding: 2rem 1rem;
        transition: var(--transition);
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      /* header style */
      .hero {
        text-align: center;
        margin-bottom: 2rem;
      }

      .hero h1 {
        font-size: 2rem;
        background: linear-gradient(120deg, #2b7a4b, #1e5a38);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .hero p {
        color: var(--text-secondary);
        margin-top: 0.5rem;
      }

      /* theme toggle */
      .theme-toggle {
        position: fixed;
        top: 1.2rem;
        left: 1.2rem;
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border-light);
        border-radius: 3rem;
        padding: 0.6rem 1rem;
        cursor: pointer;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        z-index: 100;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
      }

      .theme-toggle:hover {
        transform: scale(0.97);
        background: var(--primary);
        color: white;
      }

      /* main card */
      .speech-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border-radius: 2rem;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-light);
        padding: 1.8rem;
        transition: var(--transition);
      }

      /* settings */
      .settings-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 1.2rem;
        margin-bottom: 1.8rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-light);
      }

      .lang-box {
        flex: 2;
        min-width: 180px;
      }

      .lang-box label,
      .continuous-box label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
        color: var(--text-secondary);
      }

      select,
      button {
        font-family: inherit;
      }

      select {
        width: 100%;
        padding: 0.6rem 1rem;
        border-radius: 1rem;
        border: 1px solid var(--border-light);
        background: var(--card-bg);
        color: var(--text-primary);
        cursor: pointer;
        font-weight: 500;
      }

      .continuous-box {
        flex: 1;
        display: flex;
        align-items: flex-end;
      }

      .continuous-box label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.03);
        padding: 0.5rem 1rem;
        border-radius: 2rem;
      }

      /* mic status & vu meter */
      .mic-panel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.8rem;
      }

      .status-chip {
        background: rgba(0, 0, 0, 0.05);
        padding: 0.4rem 1.2rem;
        border-radius: 3rem;
        font-weight: 600;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid var(--border-light);
      }

      .status-chip.recording-active {
        background: var(--danger);
        color: white;
        animation: pulseMic 1.2s infinite;
      }

      @keyframes pulseMic {
        0% {
          box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(220, 53, 69, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
        }
      }

      .vu-container {
        flex: 1;
        min-width: 160px;
      }
      canvas#vuCanvas {
        width: 100%;
        height: 42px;
        background: rgba(0, 0, 0, 0.1);
        border-radius: 20px;
        display: block;
      }
      .record-buttons {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
        margin-bottom: 1.8rem;
      }
      .btn {
        border: none;
        padding: 0.7rem 1.6rem;
        border-radius: 2rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        cursor: pointer;
        transition: 0.2s;
        background: #eef2f7;
        color: #1f2a3e;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }
      .btn-outline {
        background: transparent;
        border: 1.5px solid var(--border-light);
        color: var(--text-primary);
      }
      .btn-outline:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      .btn-danger {
        background: var(--danger);
        color: white;
      }
      .btn-danger:hover {
        background: #c82333;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* text areas */
      .final-text-area {
        margin-top: 1rem;
      }
      .final-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 0.6rem;
      }
      .stats {
        font-size: 0.75rem;
        background: rgba(0, 0, 0, 0.05);
        padding: 0.2rem 0.8rem;
        border-radius: 2rem;
      }
      .action-icons {
        display: flex;
        gap: 0.5rem;
      }
      .icon-btn {
        background: transparent;
        border: none;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 0.3rem 0.7rem;
        border-radius: 2rem;
        transition: 0.2s;
        color: var(--text-secondary);
      }
      .icon-btn:hover {
        background: rgba(0, 0, 0, 0.08);
        color: var(--primary);
      }
      textarea {
        width: 100%;
        padding: 1rem;
        border-radius: 1.2rem;
        border: 1.5px solid var(--border-light);
        background: rgba(0, 0, 0, 0.02);
        color: var(--text-primary);
        font-size: 1rem;
        line-height: 1.6;
        font-family: inherit;
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }
      .interim-box {
        margin-top: 1rem;
        background: rgba(0, 0, 0, 0.03);
        border-radius: 1rem;
        padding: 0.6rem 1rem;
        border-right: 4px solid var(--primary);
        font-size: 0.85rem;
        color: var(--text-secondary);
        direction: rtl;
        word-break: break-word;
      }
      .interim-label {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .info-tip {
        margin-top: 1rem;
        font-size: 0.75rem;
        text-align: center;
        color: var(--text-secondary);
      }
      hr {
        margin: 1rem 0;
        border-color: var(--border-light);
      }
      @media (max-width: 640px) {
        .speech-card {
          padding: 1.2rem;
        }
        .btn {
          padding: 0.5rem 1.2rem;
        }
        .hero h1 {
          font-size: 1.5rem;
        }
      }
      .toast-msg {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1e2a3a;
        color: white;
        padding: 0.6rem 1.2rem;
        border-radius: 2rem;
        font-size: 0.8rem;
        z-index: 999;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
      }
      .toast-msg.show {
        opacity: 1;
        transform: translateY(-5px);
      }
    </style>
  </head>
  <body>
    <div class="theme-toggle" id="themeToggle">
      <i class="fas fa-moon"></i>
      <span>تم تاریک</span>
    </div>
    <div class="container">
      <div class="hero">
        <h1>
          <i class="fas fa-microphone-alt"></i> هوش صوتی گوگل | دیکته حرفه‌ای
        </h1>
        <p>
          ضبط زنده با Web Speech API (گوگل) · ویرایش مستقیم متن · خروجی
          Word-like
        </p>
      </div>

      <div class="speech-card">
        <!-- تنظیمات -->
        <div class="settings-grid">
          <div class="lang-box">
            <label><i class="fas fa-globe"></i> زبان گفتار</label>
            <select id="languageSelect">
              <option value="fa-IR">فارسی (ایران)</option>
              <option value="en-US">انگلیسی (آمریکا)</option>
              <option value="en-GB">انگلیسی (بریتانیا)</option>
              <option value="ar-EG">عربی (مصر)</option>
              <option value="tr-TR">ترکی استانبولی</option>
              <option value="es-ES">اسپانیایی</option>
              <option value="fr-FR">فرانسوی</option>
              <option value="de-DE">آلمانی</option>
              <option value="it-IT">ایتالیایی</option>
              <option value="ru-RU">روسی</option>
              <option value="ja-JP">ژاپنی</option>
              <option value="ko-KR">کره‌ای</option>
              <option value="zh-CN">چینی (ساده)</option>
            </select>
          </div>
          <div class="continuous-box">
            <label
              ><input type="checkbox" id="continuousMode" checked />
              <i class="fas fa-infinity"></i> ضبط پیوسته (بدون وقفه)</label
            >
          </div>
        </div>

        <!-- وضعیت میکروفون + VU meter حرفه‌ای -->
        <div class="mic-panel">
          <div class="status-chip" id="statusChip">
            <i class="fas fa-microphone-slash"></i>
            <span id="statusText">آماده</span>
          </div>
          <div class="vu-container">
            <canvas
              id="vuCanvas"
              width="300"
              height="40"
              style="width: 100%; height: 40px"
            ></canvas>
          </div>
        </div>

        <div class="record-buttons">
          <button id="startRecordBtn" class="btn btn-primary">
            <i class="fas fa-play"></i> شروع ضبط
          </button>
          <button id="stopRecordBtn" class="btn btn-outline" disabled>
            <i class="fas fa-stop"></i> توقف
          </button>
        </div>

        <!-- ناحیه متن نهایی (قابل ویرایش) -->
        <div class="final-text-area">
          <div class="final-header">
            <span class="stats" id="statsPanel"
              ><i class="fas fa-chart-simple"></i> کلمات: 0 | کاراکتر: 0</span
            >
            <div class="action-icons">
              <button class="icon-btn" id="copyFinalBtn" title="کپی متن">
                <i class="fas fa-copy"></i>
              </button>
              <button
                class="icon-btn"
                id="downloadTxtBtn"
                title="دانلود به صورت TXT"
              >
                <i class="fas fa-download"></i>
              </button>
              <button class="icon-btn" id="clearFinalBtn" title="پاک کردن همه">
                <i class="fas fa-trash-alt"></i>
              </button>
              <button
                class="icon-btn"
                id="autoSaveIndicator"
                title="ذخیره خودکار فعال"
                style="opacity: 0.7"
              >
                <i class="fas fa-save"></i>
              </button>
            </div>
          </div>
          <textarea
            id="finalTextArea"
            rows="8"
            placeholder="متن تشخیص‌داده‌شده اینجا ظاهر می‌شود. می‌توانید مستقیم ویرایش کنید..."
          ></textarea>
        </div>

        <!-- ناحیه متن موقت (حین صحبت) -->
        <div class="interim-box" id="interimBox">
          <div class="interim-label">
            <i class="fas fa-waveform"></i> متن لحظه‌ای (در حال تشخیص):
          </div>
          <div id="interimText" style="margin-top: 6px">—</div>
        </div>
        <div class="info-tip">
          <i class="fas fa-info-circle"></i> بر پایه سرویس Google Speech-to-Text
          · برای ویرایش مستقیم روی متن کلیک و تایپ کنید · ضبط پیوسته تا کلیک
          توقف ادامه دارد
        </div>
      </div>
    </div>
    <div id="toastMsg" class="toast-msg"></div>

    <script>
      (function () {
        // ----------------------------------- DOM elements
        const startBtn = document.getElementById("startRecordBtn");
        const stopBtn = document.getElementById("stopRecordBtn");
        const langSelect = document.getElementById("languageSelect");
        const continuousCheck = document.getElementById("continuousMode");
        const finalTextArea = document.getElementById("finalTextArea");
        const interimDiv = document.getElementById("interimText");
        const statusChip = document.getElementById("statusChip");
        const statusSpan = document.getElementById("statusText");
        const statsSpan = document.getElementById("statsPanel");
        const copyBtn = document.getElementById("copyFinalBtn");
        const downloadBtn = document.getElementById("downloadTxtBtn");
        const clearBtn = document.getElementById("clearFinalBtn");
        const themeToggle = document.getElementById("themeToggle");

        // canvas VU
        const canvas = document.getElementById("vuCanvas");
        const ctx = canvas.getContext("2d");

        // variables
        let recognition = null;
        let isRecording = false;
        let mediaStream = null;
        let audioContext = null;
        let sourceNode = null;
        let analyser = null;
        let animationId = null;
        let finalTextBuffer = ""; // همگام با textarea نگهداری می‌شود ولی برای اضافه کردن متن نهایی
        let interimBuffer = "";

        // helper: نمایش توست
        function showToast(msg, isError = false) {
          const toast = document.getElementById("toastMsg");
          toast.textContent = msg;
          toast.classList.add("show");
          toast.style.background = isError ? "#dc3545" : "#2b7a4b";
          setTimeout(() => toast.classList.remove("show"), 2800);
        }

        // به روز رسانی آمار
        function updateStats() {
          const text = finalTextArea.value;
          const words = text
            .trim()
            .split(/\s+/)
            .filter((w) => w.length > 0).length;
          const chars = text.length;
          statsSpan.innerHTML = `<i class="fas fa-chart-simple"></i> کلمات: ${words.toLocaleString("fa-IR")} | کاراکترها: ${chars.toLocaleString("fa-IR")}`;
          // ذخیره خودکار در localStorage
          try {
            localStorage.setItem("speechToText_backup", text);
          } catch (e) {}
        }

        // ذخیره متن فعلی هنگام ویرایش دستی
        finalTextArea.addEventListener("input", () => {
          updateStats();
          finalTextBuffer = finalTextArea.value;
        });

        // بازیابی خودکار از localStorage
        function loadBackup() {
          const saved = localStorage.getItem("speechToText_backup");
          if (saved && saved.trim().length > 0) {
            if (confirm("متن ذخیره شده قبلی یافت شد. بازیابی شود؟")) {
              finalTextArea.value = saved;
              finalTextBuffer = saved;
              updateStats();
              showToast("متن قبلی بازیابی شد", false);
            } else {
              localStorage.removeItem("speechToText_backup");
            }
          }
        }

        // افزودن متن نهایی جدید (هنگام تکمیل هر عبارت)
        function addFinalTranscript(newText) {
          if (!newText.trim()) return;
          let current = finalTextArea.value;
          let space =
            current.length > 0 &&
            !current.endsWith(" ") &&
            !current.endsWith("\n")
              ? " "
              : "";
          let updated = current + space + newText.trim();
          finalTextArea.value = updated;
          finalTextBuffer = updated;
          updateStats();
          // اسکرول خودکار
          finalTextArea.scrollTop = finalTextArea.scrollHeight;
        }

        // =============== VU Meter با canvas زیبا ===============
        async function initVUMeter(stream) {
          if (audioContext) await audioContext.close();
          audioContext = new (
            window.AudioContext || window.webkitAudioContext
          )();
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;
          sourceNode = audioContext.createMediaStreamSource(stream);
          sourceNode.connect(analyser);
          const dataArray = new Uint8Array(analyser.frequencyBinCount);
          function drawVU() {
            if (!isRecording || !analyser) {
              if (animationId) cancelAnimationFrame(animationId);
              return;
            }
            analyser.getByteFrequencyData(dataArray);
            let maxLevel = 0;
            for (let i = 0; i < dataArray.length; i++) {
              if (dataArray[i] > maxLevel) maxLevel = dataArray[i];
            }
            let percent = Math.min(100, (maxLevel / 255) * 100);
            if (canvas && ctx) {
              const w = canvas.clientWidth;
              const h = canvas.clientHeight;
              canvas.width = w;
              canvas.height = h;
              ctx.clearRect(0, 0, w, h);
              ctx.fillStyle = "#2b7a4b";
              let barWidth = Math.max(4, w * 0.02);
              let activeWidth = (percent / 100) * w;
              ctx.fillRect(0, 0, activeWidth, h);
              ctx.fillStyle = "rgba(0,0,0,0.2)";
              ctx.fillRect(activeWidth, 0, w - activeWidth, h);
              if (percent > 70) ctx.fillStyle = "#f0ad4e";
              ctx.fillRect(0, 0, activeWidth, h);
            }
            animationId = requestAnimationFrame(drawVU);
          }
          drawVU();
          await audioContext.resume();
        }

        function stopVUMeter() {
          if (animationId) cancelAnimationFrame(animationId);
          if (audioContext) {
            audioContext.close().catch((e) => console.warn);
            audioContext = null;
          }
          if (ctx && canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        }

        // توقف کامل ضبط و آزادسازی
        function haltRecording() {
          if (recognition) {
            try {
              recognition.abort();
            } catch (e) {}
            recognition = null;
          }
          if (mediaStream) {
            mediaStream.getTracks().forEach((track) => track.stop());
            mediaStream = null;
          }
          stopVUMeter();
          isRecording = false;
          startBtn.disabled = false;
          stopBtn.disabled = true;
          statusChip.classList.remove("recording-active");
          statusSpan.innerHTML = "آماده";
          statusChip.querySelector("i").className = "fas fa-microphone-slash";
          interimDiv.innerHTML = "—";
          interimBuffer = "";
        }

        // مقداردهی recognition
        function createRecognition() {
          const SpeechRecog =
            window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!SpeechRecog) {
            showToast(
              "مرورگر شما پشتیبانی نمی‌کند. از Chrome / Edge / Safari استفاده کنید.",
              true,
            );
            return null;
          }
          const recog = new SpeechRecog();
          recog.continuous = continuousCheck.checked;
          recog.interimResults = true;
          recog.lang = langSelect.value;
          recog.maxAlternatives = 1;

          recog.onstart = () => {
            isRecording = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusSpan.innerHTML = "در حال ضبط (گوگل) ...";
            statusChip.classList.add("recording-active");
            statusChip.querySelector("i").className = "fas fa-microphone";
            if (mediaStream) initVUMeter(mediaStream);
          };

          recog.onend = () => {
            if (isRecording && continuousCheck.checked) {
              // restart if continuous and still logically recording
              try {
                if (recognition) recognition.start();
              } catch (e) {
                console.warn(e);
                haltRecording();
              }
            } else {
              haltRecording();
            }
          };

          recog.onresult = (event) => {
            let finalPart = "";
            let interimPart = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
              const transcript = event.results[i][0].transcript;
              if (event.results[i].isFinal) {
                finalPart += transcript + " ";
              } else {
                interimPart += transcript;
              }
            }
            if (finalPart.trim().length > 0) {
              addFinalTranscript(finalPart.trim());
            }
            if (interimPart) {
              interimBuffer = interimPart;
              interimDiv.innerHTML =
                interimPart +
                ' <span style="opacity:0.6;">(در حال تشخیص...)</span>';
            } else if (!finalPart && interimPart === "") {
              interimDiv.innerHTML = "—";
            } else if (finalPart && interimPart === "") {
              interimDiv.innerHTML = "—";
            }
          };

          recog.onerror = (event) => {
            console.error(event.error);
            let errorMsg = "";
            if (event.error === "not-allowed")
              errorMsg = "دسترسی به میکروفون داده نشد. مجوز را بررسی کنید.";
            else if (event.error === "network")
              errorMsg = "خطای شبکه - اتصال به اینترنت لازم است.";
            else if (event.error === "no-speech")
              errorMsg = "صدایی شناسایی نشد.";
            else errorMsg = `خطا: ${event.error}`;
            showToast(errorMsg, true);
            haltRecording();
          };
          return recog;
        }

        // شروع ضبط
        async function startRecording() {
          if (isRecording) return;
          // پاک کردن متن موقت
          interimDiv.innerHTML = "—";
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            mediaStream = stream;
            recognition = createRecognition();
            if (!recognition) {
              if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
              return;
            }
            recognition.start();
          } catch (err) {
            console.error(err);
            let msg = "خطا در دسترسی به میکروفون. لطفاً مجوز فعال باشد.";
            if (err.name === "NotAllowedError")
              msg = "دسترسی به میکروفون رد شد.";
            else if (err.name === "NotFoundError") msg = "میکروفونی یافت نشد.";
            showToast(msg, true);
            startBtn.disabled = false;
          }
        }

        // توقف ضبط
        function stopRecording() {
          if (recognition) {
            try {
              recognition.stop();
            } catch (e) {}
          }
          haltRecording();
          showToast("ضبط متوقف شد. متن قابل ویرایش است.", false);
        }

        // رویدادها
        startBtn.addEventListener("click", startRecording);
        stopBtn.addEventListener("click", stopRecording);

        // تغییر زبان / حالت پیوسته در حین ضبط باعث بازآفرینی می‌شود
        async function reconfigureIfNeeded() {
          if (isRecording) {
            stopRecording();
            await new Promise((r) => setTimeout(r, 300));
            startRecording();
          } else if (recognition) {
            // اگر در حال ضبط نبود ولی نمونه ساخته شده بود، فقط زبان را بروز کنیم
            if (recognition) recognition.lang = langSelect.value;
          }
        }
        langSelect.addEventListener("change", reconfigureIfNeeded);
        continuousCheck.addEventListener("change", () => {
          if (isRecording) {
            stopRecording();
            setTimeout(() => startRecording(), 200);
          }
        });

        // copy, download, clear
        copyBtn.addEventListener("click", () => {
          const txt = finalTextArea.value;
          if (!txt.trim()) return showToast("متنی برای کپی وجود ندارد", false);
          navigator.clipboard
            .writeText(txt)
            .then(() => showToast("✅ متن در کلیپبورد کپی شد"));
        });
        downloadBtn.addEventListener("click", () => {
          const txt = finalTextArea.value;
          if (!txt.trim()) return showToast("متنی برای دانلود وجود ندارد");
          const blob = new Blob([txt], { type: "text/plain" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `speech_text_${new Date().toISOString().slice(0, 19)}.txt`;
          a.click();
          URL.revokeObjectURL(url);
          showToast("فایل TXT دانلود شد");
        });
        clearBtn.addEventListener("click", () => {
          if (confirm("تمام متن پاک می‌شود. ادامه می‌دهید؟")) {
            finalTextArea.value = "";
            finalTextBuffer = "";
            updateStats();
            showToast("متن پاک شد");
          }
        });

        // theme toggle (dark/light)
        function applyTheme(theme) {
          if (theme === "dark") document.body.classList.add("dark");
          else document.body.classList.remove("dark");
          localStorage.setItem("theme_pref", theme);
          const btnSpan = themeToggle.querySelector("span");
          if (theme === "dark") {
            themeToggle.innerHTML =
              '<i class="fas fa-sun"></i><span>تم روشن</span>';
          } else {
            themeToggle.innerHTML =
              '<i class="fas fa-moon"></i><span>تم تاریک</span>';
          }
        }
        const savedTheme = localStorage.getItem("theme_pref");
        if (savedTheme === "dark") applyTheme("dark");
        else applyTheme("light");
        themeToggle.addEventListener("click", () => {
          const isDark = document.body.classList.contains("dark");
          applyTheme(isDark ? "light" : "dark");
        });

        // پشتیبانی اولیه از Web Speech API
        if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
          startBtn.disabled = true;
          showToast(
            "مرورگر شما پشتیبانی نمی‌کند. لطفاً Chrome / Edge / Safari جدید استفاده کنید.",
            true,
          );
          document.querySelector(".info-tip").innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> مرورگر نا‌هماهنگ: از Chrome، Edge یا Safari استفاده نمایید.';
        } else {
          startBtn.disabled = false;
          loadBackup();
          updateStats();
        }
        // در صورت بسته شدن صفحه یکبار پشتیبان
        window.addEventListener("beforeunload", () => {
          if (finalTextArea.value.trim())
            localStorage.setItem("speechToText_backup", finalTextArea.value);
        });
      })();
    </script>
  </body>
</html>

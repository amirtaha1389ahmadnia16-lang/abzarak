<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>باز کردن قفل PDF | ابزارک</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Vazirmatn", sans-serif;
      }
      body {
        font-family: "Vazirmatn", sans-serif;
        background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
        padding: 2rem;
        min-height: 100vh;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .card {
        background: white;
        border-radius: 1.5rem;
        padding: 2rem;
        box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      }
      .upload-area {
        border: 2px dashed #cbd5e1;
        border-radius: 1rem;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
        margin: 1rem 0;
      }
      .upload-area.drag-over {
        border-color: #3b82f6;
        background: #f8fafc;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 2rem;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
      }
      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      .status {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 1rem;
        text-align: center;
      }
      .status.success {
        background: #dcfce7;
        color: #166534;
      }
      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }
      .status.loading {
        background: #fef9c3;
        color: #854d0e;
      }
      .hidden {
        display: none;
      }
      .flex-buttons {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #e2e8f0;
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        text-decoration: none;
        color: #1e293b;
        font-weight: 500;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="back-link"
        ><i class="fas fa-arrow-right"></i> بازگشت به ابزارک</a
      >
      <div class="card">
        <h2 style="margin-bottom: 0.5rem">🔓 باز کردن قفل PDF</h2>
        <p>
          فایل PDF قفل‌شده خود را آپلود کنید. ابزار بدون نیاز به رمز، قفل آن را
          باز می‌کند.
        </p>

        <div id="dropZone" class="upload-area">
          📁 فایل PDF را اینجا بکشید یا کلیک کنید
        </div>
        <input type="file" id="fileInput" accept=".pdf" class="hidden" />

        <button id="unlockBtn" class="hidden">🔓 باز کردن قفل</button>

        <div id="status" class="status hidden"></div>
        <div id="downloadSection" class="hidden">
          <button id="downloadBtn">📥 دانلود فایل بدون قفل</button>
        </div>
      </div>
    </div>

    <script>
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const unlockBtn = document.getElementById("unlockBtn");
      const statusDiv = document.getElementById("status");
      const downloadSection = document.getElementById("downloadSection");
      const downloadBtn = document.getElementById("downloadBtn");

      let currentFile = null;
      let decryptedBlob = null;

      function updateStatus(text, type) {
        statusDiv.textContent = text;
        statusDiv.className = `status ${type}`;
        statusDiv.classList.remove("hidden");
      }

      function handleFile(file) {
        if (!file || !file.name.endsWith(".pdf")) {
          updateStatus("❌ لطفاً یک فایل PDF معتبر انتخاب کنید.", "error");
          return;
        }
        currentFile = file;
        unlockBtn.classList.remove("hidden");
        updateStatus(
          "✅ فایل انتخاب شد. برای باز کردن قفل کلیک کنید.",
          "success",
        );
        downloadSection.classList.add("hidden");
        decryptedBlob = null;
      }

      dropZone.addEventListener("click", () => fileInput.click());
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("drag-over"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        handleFile(file);
        fileInput.files = e.dataTransfer.files;
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files.length) handleFile(e.target.files[0]);
      });

      unlockBtn.addEventListener("click", async () => {
        if (!currentFile) {
          updateStatus("⚠️ ابتدا یک فایل PDF انتخاب کنید.", "error");
          return;
        }
        unlockBtn.disabled = true;
        updateStatus("🔄 در حال ارسال به سرور و باز کردن قفل...", "loading");

        const formData = new FormData();
        formData.append("file", currentFile);

        try {
          const response = await fetch("http://127.0.0.1:8000/unlock-pdf", {
            method: "POST",
            body: formData,
          });
          if (response.ok) {
            decryptedBlob = await response.blob();
            const url = URL.createObjectURL(decryptedBlob);
            downloadBtn.onclick = () => {
              const a = document.createElement("a");
              a.href = url;
              a.download = currentFile.name.replace(".pdf", "_unlocked.pdf");
              a.click();
            };
            downloadSection.classList.remove("hidden");
            updateStatus(
              "✅ قفل با موفقیت باز شد! فایل قابل دانلود است.",
              "success",
            );
          } else {
            let errorText = "";
            try {
              const err = await response.json();
              errorText = err.detail || "خطای ناشناخته";
            } catch (e) {
              errorText = response.statusText;
            }
            updateStatus(`❌ خطا: ${errorText}`, "error");
          }
        } catch (err) {
          console.error(err);
          updateStatus(
            "❌ اتصال به سرور برقرار نشد. مطمئن شوید سرور پایتون در حال اجراست (python api_server.py)",
            "error",
          );
        } finally {
          unlockBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
